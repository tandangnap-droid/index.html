<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Discord Voice Bot - Hệ thống Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes splash-orbit {
            0% { transform: rotate(0deg) translateX(60px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
        }
        @keyframes splash-badge-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes splash-dot-pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .animate-orbit { animation: splash-orbit 5s linear infinite; }
        .animate-float { animation: splash-badge-float 3s ease-in-out infinite; }
        .animate-dot { animation: splash-dot-pulse 1.6s ease-in-out infinite; }
    </style>
</head>
<body class="antialiased bg-[#0b0d10] text-white font-sans">

    <div class="h-screen w-full flex flex-col items-center justify-center relative overflow-hidden p-4">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] bg-[#5865F2]/10 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute top-1/3 left-1/3 w-[200px] h-[200px] bg-[#EB459E]/6 rounded-full blur-[80px] pointer-events-none"></div>

        <div id="login-card" class="relative z-10 w-full max-w-md bg-[#15191e]/80 backdrop-blur-md border border-zinc-800/60 rounded-2xl p-8 shadow-2xl flex flex-col items-center">
            <div class="w-24 h-24 relative flex items-center justify-center mb-4">
                <div class="absolute w-2 h-2 rounded-full bg-[#EB459E] animate-orbit"></div>
                <div class="animate-float">
                    <svg class="w-12 h-12 text-zinc-500" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.66-10.85,68.43,68.43,0,0,1-10.5-5c.88-.65,1.72-1.33,2.53-2a75.71,75.71,0,0,0,72.9,0c.81.7,1.65,1.38,2.53,2a68.4,68.4,0,0,1-10.5,5,74.65,74.65,0,0,0,6.66,10.85,105.73,105.73,0,0,0,31.06-18.83C129.9,50.22,123.81,27.46,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/></svg>
                </div>
            </div>
            <h1 class="text-xl font-bold text-white mb-1">Đăng nhập Hệ thống</h1>
            <p class="text-xs text-zinc-400 mb-6 text-center">Bạn cần xác thực Token cá nhân để truy cập Dashboard</p>
            
            <div class="w-full space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Nhập Token Discord</label>
                    <input type="password" id="login-token" placeholder="Mfa.v2.xxxx..." 
                           class="w-full px-4 py-3 bg-[#0b0d10] border border-zinc-800 rounded-xl text-white placeholder-zinc-700 focus:outline-none focus:border-[#5865F2] focus:ring-1 focus:ring-[#5865F2] transition-all text-sm"/>
                </div>
                <button onclick="handleLogin()" id="login-btn" class="w-full py-3 bg-[#5865F2] hover:bg-[#4752c4] text-white font-medium rounded-xl transition-all shadow-lg shadow-[#5865F2]/20 active:scale-[0.98] cursor-pointer text-sm">
                    Đăng Nhập
                </button>
                <p id="login-error" class="text-xs text-rose-400 text-center font-medium min-h-[16px]"></p>
            </div>
        </div>

        <div id="dashboard-card" class="hidden relative z-10 w-full max-w-md bg-[#15191e]/80 backdrop-blur-md border border-zinc-800/60 rounded-2xl p-8 shadow-2xl flex flex-col">
            
            <div class="flex items-center justify-between mb-6 pb-4 border-b border-zinc-800/60">
                <div class="flex items-center gap-3">
                    <img id="user-avatar" src="https://discord.com/favicon.ico" class="w-10 h-10 rounded-full border border-zinc-700 object-cover bg-zinc-800" alt="Avatar"/>
                    <div>
                        <div id="user-name" class="font-bold text-white text-sm">Discord User</div>
                        <div class="text-[10px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-1.5 py-0.5 rounded font-medium inline-block mt-0.5">Đã xác thực</div>
                    </div>
                </div>
                <button onclick="handleLogout()" class="text-xs text-zinc-500 hover:text-rose-400 font-medium transition-colors cursor-pointer">
                    Đăng xuất
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">ID Kênh Thoại (Voice Channel ID)</label>
                    <input type="text" id="channelId" placeholder="Nhập ID kênh thoại cần treo..." 
                           class="w-full px-4 py-3 bg-[#0b0d10] border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-[#5865F2] focus:ring-1 focus:ring-[#5865F2] transition-all text-sm"/>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="startBot()" class="w-full py-3 bg-[#5865F2] hover:bg-[#4752c4] text-white font-medium rounded-xl transition-all shadow-lg shadow-[#5865F2]/20 active:scale-[0.98] cursor-pointer text-sm">
                        ▶ Bật Bot
                    </button>
                    <button onclick="stopBot()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium rounded-xl transition-all active:scale-[0.98] cursor-pointer text-sm">
                        ⏹ Tắt Bot
                    </button>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-amber-400 font-medium" id="status-container">
                <div class="w-2 h-2 rounded-full bg-amber-400 animate-pulse" id="status-dot"></div>
                <span id="status">Trạng thái: Đang chờ lệnh...</span>
            </div>
        </div>

        <div class="flex items-center gap-1.5 mt-8 pointer-events-none">
            <div class="w-1 h-1 rounded-full bg-[#5865F2] animate-dot" style="animation-delay: 0s;"></div>
            <div class="w-1 h-1 rounded-full bg-[#5865F2] animate-dot" style="animation-delay: 0.15s;"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-[#FEE75C] animate-dot" style="animation-delay: 0.3s;"></div>
            <div class="w-1 h-1 rounded-full bg-[#57F287] animate-dot" style="animation-delay: 0.45s;"></div>
            <div class="w-1 h-1 rounded-full bg-[#57F287] animate-dot" style="animation-delay: 0.6s;"></div>
        </div>
    </div>

    <script>
        let globalToken = null;
        let ws = null;
        let heartbeatInterval = null;
        const CORS_PROXY = "https://corsproxy.io/?";

        // 1. KHI VỪA VÀO WEB: Kiểm tra phiên đăng nhập cũ
        window.onload = async function() {
            const savedToken = localStorage.getItem('dc_logged_token');
            const savedChannelId = localStorage.getItem('dc_channelId');
            
            if (savedChannelId) {
                document.getElementById('channelId').value = savedChannelId;
            }

            if (savedToken) {
                // Hiển thị trạng thái đang kiểm tra tự động
                document.getElementById('login-btn').innerText = "Đang kiểm tra...";
                document.getElementById('login-btn').disabled = true;
                
                const loginSuccess = await checkAndLogin(savedToken);
                if (!loginSuccess) {
                    // Nếu token cũ hỏng, xóa đi bắt đăng nhập lại
                    localStorage.removeItem('dc_logged_token');
                    document.getElementById('login-btn').innerText = "Đăng Nhập";
                    document.getElementById('login-btn').disabled = false;
                }
            }
        };

        // 2. HÀM CHECK TOKEN QUA DISCORD API VÀ ĐỔI GIAO DIỆN
        async function checkAndLogin(token) {
            const errorDiv = document.getElementById('login-error');
            errorDiv.innerText = "";

            try {
                // Gọi API cá nhân của Discord thông qua Proxy để lấy thông tin Nick
                const targetUrl = "https://discord.com/api/v9/users/@me";
                const response = await fetch(CORS_PROXY + encodeURIComponent(targetUrl), {
                    headers: { "Authorization": token.trim() }
                });

                if (!response.ok) return false;

                const userData = await response.json();
                globalToken = token.trim();
                
                // Lưu Token vào bộ nhớ máy sau khi xác thực thành công
                localStorage.setItem('dc_logged_token', globalToken);

                // Cập nhật thông tin User lên Dashboard
                document.getElementById('user-name').innerText = userData.username;
                if (userData.avatar) {
                    document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png`;
                } else {
                    document.getElementById('user-avatar').src = `https://cdn.discordapp.com/embed/avatars/${userData.discriminator % 5}.png`;
                }

                // CHUYỂN GIAO DIỆN: Ẩn Login, Hiện Dashboard
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('dashboard-card').classList.remove('hidden');
                return true;

            } catch (err) {
                return false;
            }
        }

        // 3. NÚT BẤM ĐĂNG NHẬP THỦ CÔNG
        async function handleLogin() {
            const tokenInput = document.getElementById('login-token').value.trim();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');

            if (!tokenInput) {
                errorDiv.innerText = "Vui lòng nhập Token Discord!";
                return;
            }

            btn.innerText = "Đang xác thực...";
            btn.disabled = true;

            const isSuccess = await checkAndLogin(tokenInput);

            if (!isSuccess) {
                errorDiv.innerText = "Token sai hoặc đã hết hạn!";
                btn.innerText = "Đăng Nhập";
                btn.disabled = false;
            }
        }

        // 4. NÚT BẤM ĐĂNG XUẤT
        function handleLogout() {
            stopBot(); // Tắt kết nối WebSocket nếu đang chạy
            localStorage.removeItem('dc_logged_token');
            globalToken = null;
            
            // Trả về giao diện Login ban đầu
            document.getElementById('login-token').value = "";
            document.getElementById('login-btn').innerText = "Đăng Nhập";
            document.getElementById('login-btn').disabled = false;
            
            document.getElementById('dashboard-card').classList.add('hidden');
            document.getElementById('login-card').classList.remove('hidden');
        }

        // 5. CẬP NHẬT TRẠNG THÁI ĐÈN TÍN HIỆU TRÊN DASHBOARD
        function updateStatus(text, type = "warning") {
            const statusText = document.getElementById('status');
            const statusDot = document.getElementById('status-dot');
            const container = document.getElementById('status-container');
            
            statusText.innerText = "Trạng thái: " + text;
            
            if (type === "success") {
                container.className = "mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-emerald-400 font-medium";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-400 animate-pulse";
            } else if (type === "error") {
                container.className = "mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-rose-400 font-medium";
                statusDot.className = "w-2 h-2 rounded-full bg-rose-400";
            } else {
                container.className = "mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-amber-400 font-medium";
                statusDot.className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse";
            }
        }

        // 6. CORE LOGIC: BẬT/TẮT BOT QUA WEBSOCKET (Sử dụng Token đã Đăng nhập)
        async function startBot() {
            const channelId = document.getElementById('channelId').value.trim();

            if (!channelId) {
                alert("Vui lòng nhập ID Kênh thoại!");
                return;
            }

            if (ws) {
                updateStatus("Bot đang hoạt động rồi!", "warning");
                return;
            }

            localStorage.setItem('dc_channelId', channelId);
            updateStatus("Đang kiểm tra phòng thoại...", "warning");

            try {
                const targetUrl = `https://discord.com/api/v9/channels/${channelId}`;
                const response = await fetch(CORS_PROXY + encodeURIComponent(targetUrl), {
                    headers: { "Authorization": globalToken }
                });

                if (!response.ok) throw new Error("ID Kênh không tồn tại hoặc tài khoản không có quyền vào!");
                const channelData = await response.json();
                const guildId = channelData.guild_id;

                updateStatus("Đang mở cổng Gateway kết nối...", "warning");

                ws = new WebSocket("wss://gateway.discord.gg/?v=9&encoding=json");

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.op === 10) {
                        const interval = data.d.heartbeat_interval;
                        heartbeatInterval = setInterval(() => {
                            ws.send(JSON.stringify({ op: 1, d: null }));
                        }, interval);

                        ws.send(JSON.stringify({
                            op: 2,
                            d: {
                                token: globalToken,
                                capabilities: 16381,
                                properties: { os: "Windows", browser: "Chrome", device: "" },
                                presence: { status: "online", afk: false },
                                compress: false,
                                client_state: { guild_versions: {}, highest_last_message_id: "0", read_state_version: 0, user_guild_settings_version: -1, user_settings_version: -1, private_channels_version: "0", api_code_version: 0 }
                            }
                        }));
                    }

                    if (data.t === "READY") {
                        ws.send(JSON.stringify({
                            op: 4,
                            d: {
                                guild_id: guildId,
                                channel_id: channelId,
                                self_mute: true,
                                self_deaf: false
                            }
                        }));
                        updateStatus(`Đã treo trong phòng [${channelData.name || channelId}]`, "success");
                    }
                };

                ws.onerror = () => {
                    updateStatus("Lỗi mạng WebSocket!", "error");
                    stopBot();
                };

                ws.onclose = () => {
                    updateStatus("Đã ngắt kết nối.", "error");
                    ws = null;
                };

            } catch (err) {
                updateStatus(err.message, "error");
                ws = null;
            }
        }

        function stopBot() {
            updateStatus("Đang tiến hành tắt bot...", "warning");

            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    op: 4,
                    d: { guild_id: null, channel_id: null, self_mute: true, self_deaf: false }
                }));
                setTimeout(() => {
                    ws.close();
                    ws = null;
                }, 400);
            } else {
                ws = null;
                updateStatus("Bot chưa được kích hoạt!", "error");
            }
        }
    </script>
</body>
</html>
