<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Discord Voice Bot - Giao diện tự động lưu Token</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Các hiệu ứng chuyển động (Animation) lấy từ trang gốc */
        @keyframes splash-orbit {
            0% { transform: rotate(0deg) translateX(60px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
        }
        @keyframes splash-badge-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes splash-dot-pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .animate-orbit { animation: splash-orbit 5s linear infinite; }
        .animate-float { animation: splash-badge-float 3s ease-in-out infinite; }
        .animate-dot { animation: splash-dot-pulse 1.6s ease-in-out infinite; }
    </style>
</head>
<body class="antialiased bg-[#0b0d10] text-white font-sans">

    <div class="h-screen w-full flex flex-col items-center justify-center relative overflow-hidden p-4">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] bg-[#5865F2]/10 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute top-1/3 left-1/3 w-[200px] h-[200px] bg-[#EB459E]/6 rounded-full blur-[80px] pointer-events-none"></div>

        <div class="relative z-10 w-full max-w-md bg-[#15191e]/80 backdrop-blur-md border border-zinc-800/60 rounded-2xl p-8 shadow-2xl">
            
            <div class="flex flex-col items-center mb-6">
                <div class="w-24 h-24 relative flex items-center justify-center mb-2">
                    <div class="absolute w-2 h-2 rounded-full bg-[#5865F2] animate-orbit" style="animation-delay: 0s;"></div>
                    <div class="absolute w-2 h-2 rounded-full bg-[#EB459E] animate-orbit" style="animation-delay: 0.8s;"></div>
                    <div class="absolute w-2 h-2 rounded-full bg-[#57F287] animate-orbit" style="animation-delay: 1.6s;"></div>
                    
                    <div class="animate-float">
                        <svg class="w-12 h-12 text-[#5865F2] drop-shadow-[0_0_10px_rgba(88,101,242,0.5)]" viewBox="0 0 127.14 96.36" fill="currentColor">
                            <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.66-10.85,68.43,68.43,0,0,1-10.5-5c.88-.65,1.72-1.33,2.53-2a75.71,75.71,0,0,0,72.9,0c.81.7,1.65,1.38,2.53,2a68.4,68.4,0,0,1-10.5,5,74.65,74.65,0,0,0,6.66,10.85,105.73,105.73,0,0,0,31.06-18.83C129.9,50.22,123.81,27.46,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
                        </svg>
                    </div>
                </div>

                <h1 class="text-2xl font-bold tracking-tight text-white">Discord Voice Center</h1>
                <p class="text-sm text-zinc-400 mt-1">Chạy trực tiếp trên trình duyệt & Tự lưu thông tin</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Token Tài Khoản</label>
                    <input type="password" id="token" placeholder="Nhập Token Discord cá nhân..." 
                           class="w-full px-4 py-3 bg-[#0b0d10] border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-[#5865F2] focus:ring-1 focus:ring-[#5865F2] transition-all" />
                </div>

                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">ID Kênh Thoại (Voice Channel)</label>
                    <input type="text" id="channelId" placeholder="Nhập ID kênh thoại cần treo..." 
                           class="w-full px-4 py-3 bg-[#0b0d10] border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-[#5865F2] focus:ring-1 focus:ring-[#5865F2] transition-all" />
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="startBot()" class="w-full py-3 bg-[#5865F2] hover:bg-[#4752c4] text-white font-medium rounded-xl transition-all shadow-lg shadow-[#5865F2]/20 active:scale-[0.98] cursor-pointer">
                        ▶ Bật Bot
                    </button>
                    <button onclick="stopBot()" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium rounded-xl transition-all active:scale-[0.98] cursor-pointer">
                        ⏹ Tắt Bot
                    </button>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-amber-400 font-medium" id="status-container">
                <div class="w-2 h-2 rounded-full bg-amber-400 animate-pulse" id="status-dot"></div>
                <span id="status">Trạng thái: Đang chờ lệnh...</span>
            </div>

        </div>

        <div class="flex items-center gap-1.5 mt-8 pointer-events-none">
            <div class="w-1 h-1 rounded-full bg-[#5865F2] animate-dot" style="animation-delay: 0s;"></div>
            <div class="w-1 h-1 rounded-full bg-[#5865F2] animate-dot" style="animation-delay: 0.15s;"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-[#FEE75C] animate-dot" style="animation-delay: 0.3s;"></div>
            <div class="w-1 h-1 rounded-full bg-[#57F287] animate-dot" style="animation-delay: 0.45s;"></div>
            <div class="w-1 h-1 rounded-full bg-[#57F287] animate-dot" style="animation-delay: 0.6s;"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let heartbeatInterval = null;
        const CORS_PROXY = "https://corsproxy.io/?";

        // [TÍNH NĂNG MỚI]: Tự động gọi lại Token và ID phòng cũ khi vừa mở Web
        window.onload = function() {
            const savedToken = localStorage.getItem('dc_token');
            const savedChannelId = localStorage.getItem('dc_channelId');
            if (savedToken) document.getElementById('token').value = savedToken;
            if (savedChannelId) document.getElementById('channelId').value = savedChannelId;
        };

        function updateStatus(text, type = "warning") {
            const statusText = document.getElementById('status');
            const statusDot = document.getElementById('status-dot');
            const container = document.getElementById('status-container');
            
            statusText.innerText = "Trạng thái: " + text;
            
            // Đổi màu sắc hiển thị dựa trên trạng thái thực tế
            if (type === "success") {
                container.className = "mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-emerald-400 font-medium";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-400 animate-pulse";
            } else if (type === "error") {
                container.className = "mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-rose-400 font-medium";
                statusDot.className = "w-2 h-2 rounded-full bg-rose-400";
            } else {
                container.className = "mt-6 pt-4 border-t border-zinc-800/60 flex items-center justify-center gap-2 text-sm text-amber-400 font-medium";
                statusDot.className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse";
            }
        }

        async function startBot() {
            const token = document.getElementById('token').value.trim();
            const channelId = document.getElementById('channelId').value.trim();

            if (!token || !channelId) {
                alert("Vui lòng nhập đầy đủ cả Token và ID Kênh!");
                return;
            }

            if (ws) {
                updateStatus("Bot đang hoạt động rồi!", "warning");
                return;
            }

            // Ghi nhớ thông tin vào máy để lần sau không cần nhập lại
            localStorage.setItem('dc_token', token);
            localStorage.setItem('dc_channelId', channelId);

            updateStatus("Đang quét thông tin phòng thoại...", "warning");

            try {
                const targetUrl = `https://discord.com/api/v9/channels/${channelId}`;
                const response = await fetch(CORS_PROXY + encodeURIComponent(targetUrl), {
                    headers: { "Authorization": token }
                });

                if (!response.ok) throw new Error("Token sai hoặc kênh không tồn tại");
                const channelData = await response.json();
                const guildId = channelData.guild_id;

                updateStatus("Kết nối Discord Gateway...", "warning");

                ws = new WebSocket("wss://gateway.discord.gg/?v=9&encoding=json");

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.op === 10) {
                        const interval = data.d.heartbeat_interval;
                        heartbeatInterval = setInterval(() => {
                            ws.send(JSON.stringify({ op: 1, d: null }));
                        }, interval);

                        ws.send(JSON.stringify({
                            op: 2,
                            d: {
                                token: token,
                                capabilities: 16381,
                                properties: { os: "Windows", browser: "Chrome", device: "" },
                                presence: { status: "online", afk: false },
                                compress: false,
                                client_state: { guild_versions: {}, highest_last_message_id: "0", read_state_version: 0, user_guild_settings_version: -1, user_settings_version: -1, private_channels_version: "0", api_code_version: 0 }
                            }
                        }));
                    }

                    if (data.t === "READY") {
                        ws.send(JSON.stringify({
                            op: 4,
                            d: {
                                guild_id: guildId,
                                channel_id: channelId,
                                self_mute: true,
                                self_deaf: false
                            }
                        }));
                        updateStatus(`Đã treo trong kênh [${channelData.name || channelId}]`, "success");
                    }
                };

                ws.onerror = () => {
                    updateStatus("Lỗi đường truyền mạng WebSocket!", "error");
                    stopBot();
                };

                ws.onclose = () => {
                    updateStatus("Đã ngắt kết nối.", "error");
                    ws = null;
                };

            } catch (err) {
                updateStatus(err.message, "error");
                ws = null;
            }
        }

        function stopBot() {
            updateStatus("Đang tiến hành tắt bot...", "warning");

            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    op: 4,
                    d: { guild_id: null, channel_id: null, self_mute: true, self_deaf: false }
                }));
                setTimeout(() => {
                    ws.close();
                    ws = null;
                }, 400);
            } else {
                ws = null;
                updateStatus("Bot chưa được kích hoạt từ trước!", "error");
            }
        }
    </script>
</body>
</html>
